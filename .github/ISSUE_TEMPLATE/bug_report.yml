name: 缺陷报告
description: 报告可以稳定复现的问题
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 感谢你帮助改进项目。安全漏洞请使用 Security 页面的私密报告入口。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请说明实际行为以及你预期发生什么。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动……
        2. 导入……
        3. 点击……
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、Python、Node.js 和浏览器版本。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请先删除密钥、真实数据和其他敏感信息。
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现重复报告。
          required: true
        - label: 这不是需要私密报告的安全漏洞。
          required: true
