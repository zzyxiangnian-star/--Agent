name: 功能建议
description: 提议新的功能或改进方向
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 这个建议希望解决什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述期望的交互、输入和输出。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 可选方案
      description: 你是否考虑过其他解决方式？
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
